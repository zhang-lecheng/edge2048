<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 RL Demo - Client Side</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  user-select: none;
}
.container {
  text-align: center;
  padding: 20px;
}
h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  color: #888;
  font-size: 13px;
  margin-bottom: 16px;
  letter-spacing: 1px;
}
.subtitle span { color: #ffd200; -webkit-text-fill-color: #ffd200; background: none; }
.game-wrapper {
  display: flex;
  gap: 30px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: wrap;
}
.board-section {
  position: relative;
}
canvas#board {
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  display: block;
  background: #bbada0;
  max-width: 100%;
  height: auto;
  aspect-ratio: 1 / 1;
  touch-action: none;
}
.score-board {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 12px;
}
.score-item {
  background: #2d2d44;
  padding: 8px 20px;
  border-radius: 8px;
  min-width: 90px;
}
.score-item .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
.score-item .value { font-size: 22px; font-weight: 700; color: #fff; }
.controls {
  margin-top: 14px;
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.controls button, .controls .btn {
  background: #2d2d44;
  color: #e0e0e0;
  border: 1px solid #444;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.controls button:hover { background: #3d3d55; border-color: #f7971e; }
.controls button:active { transform: scale(0.96); }
.controls button.active { background: #f7971e; color: #1a1a2e; border-color: #f7971e; font-weight: 700; }
.speed-control {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #2d2d44;
  padding: 4px 12px;
  border-radius: 6px;
  border: 1px solid #444;
}
.speed-control label { font-size: 12px; color: #aaa; }
.speed-control input[type=range] { width: 80px; accent-color: #f7971e; }
.speed-control input[type=number] {
  width: 50px; background: #1a1a2e; border: 1px solid #444;
  color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 13px;
}
.status-bar {
  margin-top: 14px;
  font-size: 13px;
  color: #888;
  min-height: 20px;
}
.key-hint {
  font-size: 11px;
  color: #666;
  margin-top: 6px;
}
.tip-panel {
  background: #2d2d44;
  border-radius: 10px;
  padding: 16px 20px;
  min-width: 200px;
  text-align: left;
  border: 1px solid #444;
}
.tip-panel h3 { font-size: 14px; color: #f7971e; margin-bottom: 8px; }
.tip-panel p { font-size: 12px; color: #aaa; line-height: 1.6; margin-bottom: 4px; }
.tip-panel .stat {
  display: flex; justify-content: space-between; padding: 2px 0;
  font-size: 13px; border-bottom: 1px solid #333;
}
.tip-panel .stat:last-child { border-bottom: none; }
.tip-panel .stat .l { color: #888; }
.tip-panel .stat .r { color: #ffd200; font-weight: 600; }

.loading-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #1a1a2e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
}
.spinner { width: 48px; height: 48px; border: 6px solid #333; border-top-color: #f7971e; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay h2 { margin-top: 20px; color: #f7971e; }
.loading-overlay p { margin-top: 10px; color: #888; font-size: 14px; }
</style>
</head>
<body>

<div id="loadingPanel" class="loading-overlay">
  <div class="spinner"></div>
  <h2>Initializing Edge AI</h2>
  <p id="loadText">Loading 13.5 MB weights to browser...</p>
</div>

<div class="container">
  <h1>2048 · RL · EDGE AI</h1>
  <div class="subtitle">Client-Side Compute · <span>100% Local</span></div>

  <div class="score-board">
    <div class="score-item"><div class="label">Score</div><div class="value" id="scoreDisplay">0</div></div>
    <div class="score-item"><div class="label">Best</div><div class="value" id="bestScoreDisplay">0</div></div>
    <div class="score-item"><div class="label">Max Tile</div><div class="value" id="maxTileDisplay">-</div></div>
  </div>

  <div class="game-wrapper">
    <div class="board-section">
      <canvas id="board" width="400" height="400"></canvas>
      <div class="controls">
        <button id="btnNewGame">🔄 New Game</button>
        <button id="btnAI">🤖 AI Play</button>
        <div class="speed-control">
          <label>Speed</label>
          <input type="range" id="speedRange" min="1" max="20" value="1" step="1">
          <input type="number" id="speedInput" value="1" min="0.1" max="99" step="0.5">
          <span style="font-size:12px;color:#888">步/秒</span>
        </div>
      </div>
      <div class="key-hint">方向键 / WASD 操作 · AI 模式下可随时按方向键夺回控制</div>
      <div class="status-bar" id="statusBar">等待 AI 初始化...</div>
    </div>

    <div class="tip-panel" id="statsPanel">
      <h3>📊 Session Stats</h3>
      <div class="stat"><span class="l">Games Played</span><span class="r" id="statGames">0</span></div>
      <div class="stat"><span class="l">Win Rate</span><span class="r" id="statWR">-</span></div>
      <div class="stat"><span class="l">Avg Score</span><span class="r" id="statAvg">-</span></div>
      <div class="stat"><span class="l">Best Score</span><span class="r" id="statBest">0</span></div>
      <div class="stat"><span class="l">Highest Tile</span><span class="r" id="statMaxTile">-</span></div>
    </div>
  </div>
</div>

<script>
// ============ 1. AI 初始化与核心逻辑 ============
let patterns = null, tables = null, config = null, symIndices = null;
let aiReady = false;

async function initAI() {
  const loadText = document.getElementById('loadText');
  try {
    loadText.textContent = 'Downloading model configuration...';
    const [pRes, cRes] = await Promise.all([fetch('web_model/patterns.json'), fetch('web_model/config.json')]);
    patterns = await pRes.json();
    config = await cRes.json();

    loadText.textContent = 'Downloading 13.5MB weight table...';
    const tRes = await fetch('web_model/tables.bin');
    const ab = await tRes.arrayBuffer();
    tables = new Float32Array(ab);

    loadText.textContent = 'Compiling symmetry transforms...';
    symIndices = [];
    for (let pi = 0; pi < patterns.length; pi++) {
      const pat = patterns[pi];
      const syms = [];
      // 8 重对称：4 旋转 x 2 翻转
      for (let flip = 0; flip <= 1; flip++) {
        for (let rot = 0; rot < 4; rot++) {
          const cur = [];
          for (let j = 0; j < pat.length; j++) {
            let r = pat[j][0], c = pat[j][1];
            if (flip) c = 3 - c;
            for (let k = 0; k < rot; k++) { const tmp = c; c = 3 - r; r = tmp; }
            cur.push(r * 4 + c);
          }
          syms.push(cur);
        }
      }
      symIndices.push(syms);
    }

    document.getElementById('loadingPanel').style.display = 'none';
    aiReady = true;
    console.log('AI Ready:', patterns.length, 'patterns,', tables.length, 'weights');
    document.getElementById('statusBar').textContent = '🎮 方向键/WASD 操作 · [Space] 切换 AI · [N] 新游戏';
  } catch (e) {
    loadText.textContent = 'Failed to load: ' + e.message;
    console.error(e);
  }
}

// 8-fold 对称的价值评估函数
function getValue(bf) {
  let total = 0;
  for (let pi = 0; pi < patterns.length; pi++) {
    const off = config.offsets[pi];
    for (let si = 0; si < 8; si++) {
      let idx = 0;
      const posList = symIndices[pi][si];
      for (let p = 0; p < posList.length; p++) {
        let v = bf[posList[p]];
        if (v >= 17) v = 16;
        idx = idx * 17 + v;
      }
      total += tables[off + idx];
    }
  }
  return total / (patterns.length * 8);
}

// 简化的滑动合并（仅用于 AI 搜索）
function slideAndMerge(row) {
  const t = row.filter(v => v !== 0);
  const r = [];
  for (let i = 0; i < t.length; i++) {
    if (i + 1 < t.length && t[i] === t[i + 1]) {
      r.push(t[i] + 1);
      i++;
    } else {
      r.push(t[i]);
    }
  }
  while (r.length < 4) r.push(0);
  return r;
}

function applyActionForSearch(bf, a) {
  const nb = bf.slice();
  let moved = false;
  for (let i = 0; i < 4; i++) {
    let idx;
    if (a === 0) idx = [i, i + 4, i + 8, i + 12];          // up
    else if (a === 1) idx = [i + 12, i + 8, i + 4, i];    // down
    else if (a === 2) idx = [i * 4, i * 4 + 1, i * 4 + 2, i * 4 + 3]; // left
    else idx = [i * 4 + 3, i * 4 + 2, i * 4 + 1, i * 4];  // right
    const row = idx.map(j => bf[j]);
    const nr = slideAndMerge(row);
    for (let j = 0; j < 4; j++) {
      if (bf[idx[j]] !== nr[j]) moved = true;
      nb[idx[j]] = nr[j];
    }
  }
  return { nb, moved };
}

function bestResp(bf) {
  let bv = -1e9;
  for (let a = 0; a < 4; a++) {
    const { nb, moved } = applyActionForSearch(bf, a);
    if (moved) {
      const v = getValue(nb);
      if (v > bv) bv = v;
    }
  }
  return bv > -1e8 ? bv : -1e8;
}

function selectMove(bf, samps) {
  let ba = 0, bv = -1e9;
  for (let a = 0; a < 4; a++) {
    const { nb, moved } = applyActionForSearch(bf, a);
    if (!moved) continue;
    const empty = [];
    for (let i = 0; i < 16; i++) if (nb[i] === 0) empty.push(i);
    let score = 0;
    if (empty.length === 0) {
      score = getValue(nb);
    } else {
      const ns = Math.min(empty.length, samps);
      const step = Math.floor(empty.length / ns);
      for (let i = 0; i < ns; i++) {
        const pos = empty[(i * step) % empty.length];
        nb[pos] = 1; const v2 = bestResp(nb);
        nb[pos] = 2; const v4 = bestResp(nb);
        nb[pos] = 0;
        score += 0.9 * v2 + 0.1 * v4;
      }
      score /= ns;
    }
    if (score > bv) { bv = score; ba = a; }
  }
  return ba;
}

// ============ 2. 游戏引擎 (完全对齐 5000 端口) ============
const SIZE = 4;
const TILE_COLORS = {
  0: {bg:'#cdc1b4', fg:'#776e65'},
  1: {bg:'#eee4da', fg:'#776e65'},
  2: {bg:'#ede0c8', fg:'#776e65'},
  3: {bg:'#f2b179', fg:'#f9f6f2'},
  4: {bg:'#f59563', fg:'#f9f6f2'},
  5: {bg:'#f67c5f', fg:'#f9f6f2'},
  6: {bg:'#f65e3b', fg:'#f9f6f2'},
  7: {bg:'#edcf72', fg:'#f9f6f2'},
  8: {bg:'#edcc61', fg:'#f9f6f2'},
  9: {bg:'#edc850', fg:'#f9f6f2'},
  10:{bg:'#edc53f', fg:'#f9f6f2'},
  11:{bg:'#3c3a32', fg:'#f9f6f2'},
};

let board = Array(16).fill(0);
let score = 0;
let gameOver = false;
let bestScore = parseInt(localStorage.getItem('best2048') || '0');
document.getElementById('bestScoreDisplay').textContent = bestScore;

let stats = { games: 0, wins: 0, scores: [], maxTiles: [] };

function newTile() {
  let empty = board.map((v, i) => v === 0 ? i : -1).filter(i => i >= 0);
  if (!empty.length) return;
  let i = empty[Math.floor(Math.random() * empty.length)];
  board[i] = Math.random() < 0.9 ? 1 : 2;
}

function initBoard() {
  board.fill(0);
  score = 0; gameOver = false;
  newTile(); newTile();
  render();
  updateScore();
}

function slideRow(row) {
  let t = row.filter(v => v !== 0);
  let r = [];
  for (let i = 0; i < t.length; i++) {
    if (i + 1 < t.length && t[i] === t[i + 1]) {
      r.push(t[i] + 1); i++;
    } else r.push(t[i]);
  }
  while (r.length < 4) r.push(0);
  return r;
}

function getScoreGain(rowBefore, rowAfter) {
  let b = rowBefore.filter(v => v !== 0);
  let a = rowAfter.filter(v => v !== 0);
  let gain = 0;
  let bi = 0, ai = 0;
  while (bi < b.length && ai < a.length) {
    if (b[bi] !== a[ai]) {
      gain += 1 << a[ai]; bi += 2; ai++;
    } else { bi++; ai++; }
  }
  return gain;
}

function move(action) {
  if (gameOver) return false;
  let moved = false;
  for (let i = 0; i < 4; i++) {
    let row, idx;
    if (action === 0) { idx = [i, i + 4, i + 8, i + 12]; row = idx.map(j => board[j]); }
    else if (action === 1) { idx = [i + 12, i + 8, i + 4, i]; row = idx.map(j => board[j]); }
    else if (action === 2) { idx = [i * 4, i * 4 + 1, i * 4 + 2, i * 4 + 3]; row = idx.map(j => board[j]); }
    else { idx = [i * 4 + 3, i * 4 + 2, i * 4 + 1, i * 4]; row = idx.map(j => board[j]); }
    let newRow = slideRow(row);
    let gain = getScoreGain(row, newRow);
    score += gain;
    for (let j = 0; j < 4; j++) {
      if (board[idx[j]] !== newRow[j]) { moved = true; }
      board[idx[j]] = newRow[j];
    }
  }
  if (!moved) return false;
  newTile();
  render();
  updateScore();
  checkGameOver();
  return true;
}

function checkGameOver() {
  if (board.some(v => v === 0)) return false;
  for (let action = 0; action < 4; action++) {
    let test = [...board];
    let moved = false;
    for (let i = 0; i < 4; i++) {
      let idx;
      if (action === 0) idx = [i, i + 4, i + 8, i + 12];
      else if (action === 1) idx = [i + 12, i + 8, i + 4, i];
      else if (action === 2) idx = [i * 4, i * 4 + 1, i * 4 + 2, i * 4 + 3];
      else idx = [i * 4 + 3, i * 4 + 2, i * 4 + 1, i * 4];
      let row = idx.map(j => test[j]);
      let newRow = slideRow(row);
      for (let j = 0; j < 4; j++) {
        if (test[idx[j]] !== newRow[j]) moved = true;
        test[idx[j]] = newRow[j];
      }
    }
    if (moved) return false;
  }
  gameOver = true;
  document.getElementById('statusBar').textContent = '💀 Game Over!';
  recordGame();
  return true;
}

function getMaxTile() {
  let max = 0;
  for (let v of board) if (v > max) max = v;
  return max;
}

function recordGame() {
  let mt = getMaxTile();
  stats.games++;
  stats.scores.push(score);
  stats.maxTiles.push(mt);
  if (mt >= 11) stats.wins++;
  if (score > bestScore) { bestScore = score; localStorage.setItem('best2048', bestScore); document.getElementById('bestScoreDisplay').textContent = bestScore; }
  updateStatsPanel();
}

function updateScore() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('bestScoreDisplay').textContent = bestScore;
  let mt = getMaxTile();
  document.getElementById('maxTileDisplay').textContent = mt === 0 ? '-' : (1 << mt);
}

function updateStatsPanel() {
  document.getElementById('statGames').textContent = stats.games;
  document.getElementById('statWR').textContent = stats.games > 0 ? (stats.wins / stats.games * 100).toFixed(1) + '%' : '-';
  document.getElementById('statAvg').textContent = stats.scores.length > 0 ? Math.round(stats.scores.reduce((a, b) => a + b, 0) / stats.scores.length) : '-';
  document.getElementById('statBest').textContent = Math.max(...stats.scores, 0);
  let maxT = Math.max(...stats.maxTiles, 0);
  document.getElementById('statMaxTile').textContent = maxT > 0 ? (1 << maxT) : '-';
}

// ============ 3. Canvas 渲染 ============
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

function getCanvasSize() {
  let vw = Math.min(window.innerWidth - 40, 440);
  return Math.min(vw, 400);
}

function resizeCanvas() {
  let size = getCanvasSize();
  canvas.width = size;
  canvas.height = size;
  render();
}

const CELL = 90, GAP = 12, RADIUS = 6;

function render() {
  let W = canvas.width;
  let scale = W / (CELL * 4 + GAP * 5);
  let cell = CELL * scale;
  let gap = GAP * scale;
  let off = gap;
  let radius = RADIUS * scale;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#bbada0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 16; i++) {
    let r = Math.floor(i / 4), c = i % 4;
    let x = off + c * (cell + gap), y = off + r * (cell + gap);
    let v = board[i];
    let col = TILE_COLORS[v] || TILE_COLORS[0];
    ctx.shadowColor = 'rgba(0,0,0,0.15)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;
    ctx.beginPath();
    ctx.roundRect(x, y, cell, cell, radius);
    ctx.fillStyle = col.bg;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    if (v > 0) {
      let text = '' + (1 << v);
      let fs = text.length >= 5 ? Math.floor(22 * scale) : text.length >= 4 ? Math.floor(26 * scale) : Math.floor(32 * scale);
      if (fs < 12) fs = 12;
      ctx.font = `bold ${fs}px 'Segoe UI', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = col.fg;
      ctx.fillText(text, x + cell / 2, y + cell / 2 + 2 * scale);
    }
  }
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    let fs = Math.max(24, Math.floor(40 * scale));
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10 * scale);
    ctx.font = `${Math.max(14, Math.floor(18 * scale))}px sans-serif`;
    ctx.fillStyle = '#ddd';
    ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 35 * scale);
  }
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

// ============ 4. AI 控制 ============
let aiMode = false;
let aiTimer = null;
let currentSpeed = 1;

async function askAI() {
  // 前端纯本地评估
  let a = selectMove(board, 3);
  return a;
}

async function aiStep() {
  if (gameOver || !aiMode) { stopAI(); return; }
  let action = await askAI();
  if (action >= 0) {
    move(action);
  } else {
    stopAI();
  }
}

function scheduleAI() {
  if (!aiMode || gameOver) { stopAI(); return; }
  let interval = 1000 / currentSpeed;
  aiTimer = setTimeout(async () => {
    await aiStep();
    scheduleAI();
  }, interval);
}

function startAI() {
  if (gameOver) { initBoard(); stats = { games: 0, wins: 0, scores: [], maxTiles: [] }; updateStatsPanel(); }
  aiMode = true;
  document.getElementById('btnAI').classList.add('active');
  document.getElementById('btnAI').textContent = '⏹ AI Playing...';
  document.getElementById('statusBar').textContent = `🤖 AI 模式 (${currentSpeed} 步/秒) · 按方向键夺回控制`;
  scheduleAI();
}

function stopAI() {
  aiMode = false;
  if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }
  document.getElementById('btnAI').classList.remove('active');
  document.getElementById('btnAI').textContent = '🤖 AI Play';
}

// ============ 5. 交互控制 ============
document.getElementById('btnNewGame').addEventListener('click', () => { stopAI(); initBoard(); });
document.getElementById('btnAI').addEventListener('click', () => { if (aiMode) stopAI(); else startAI(); });

const speedRange = document.getElementById('speedRange');
const speedInput = document.getElementById('speedInput');
function updateSpeed(v) {
  v = parseFloat(v);
  if (isNaN(v) || v <= 0) v = 1;
  if (v > 99) v = 99;
  currentSpeed = v;
  speedRange.value = v;
  speedInput.value = v;
  if (aiMode) { clearTimeout(aiTimer); scheduleAI(); }
}
speedRange.addEventListener('input', () => updateSpeed(speedRange.value));
speedInput.addEventListener('input', () => updateSpeed(speedInput.value));

const KEY_MAP = { 'ArrowUp': 0, 'w': 0, 'W': 0, 'ArrowDown': 1, 's': 1, 'S': 1, 'ArrowLeft': 2, 'a': 2, 'A': 2, 'ArrowRight': 3, 'd': 3, 'D': 3 };
document.addEventListener('keydown', (e) => {
  let action = KEY_MAP[e.key];
  if (action !== undefined) { e.preventDefault(); if (aiMode) { stopAI(); } move(action); }
  if (e.key === 'n' || e.key === 'N') { stopAI(); initBoard(); }
  if (e.key === ' ') { e.preventDefault(); document.getElementById('btnAI').click(); }
});

window.addEventListener('load', () => { resizeCanvas(); initBoard(); document.getElementById('stableBar').textContent = '🎮 方向键/WASD 操作 · [Space] 切换 AI · [N] 新游戏'; });
window.addEventListener('resize', resizeCanvas);

// ============ 启动 ============
initAI();
</script>
</body>
</html>
