<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048 RL - Edge AI (Local 2-ply Expectimax)</title>
<style>
:root {
    --bg: #1a1a2e;
    --board-bg: #bbada0;
    --grid-gap: 12px;
    --cell-size: 85px;
    /* 一次移动的像素步长 = 单元格 + 间距 */
    --move-step: calc(var(--cell-size) + var(--grid-gap));
}
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
body { background: var(--bg); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif;
       display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
.container { text-align: center; width: 100%; max-width: 460px; padding: 10px; }
h1 { font-size: 28px; font-weight: 800; margin-bottom: 5px;
     background: linear-gradient(135deg, #f7971e, #ffd200);
     -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.score-board { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
.score-box { background: #2d2d44; padding: 10px; border-radius: 8px; min-width: 100px; border: 1px solid #444; }
.score-box label { display: block; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
.score-box span { font-size: 20px; font-weight: 700; color: #ffd200; }

/* 棋盘尺寸由 CSS 变量推导，保证响应式自洽 */
#game-board {
    width: calc(4 * var(--cell-size) + 5 * var(--grid-gap));
    height: calc(4 * var(--cell-size) + 5 * var(--grid-gap));
    background: var(--board-bg); border-radius: 10px;
    position: relative; padding: var(--grid-gap); margin: 0 auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.grid-bg-cell {
    width: var(--cell-size); height: var(--cell-size);
    background: rgba(238, 228, 218, 0.35); border-radius: 6px;
    position: absolute; /* left/top 在 JS 里按公式设置 */
}

/*
  关键修复：
  - .tile 用 left/top 锁定基准偏移（等于 padding/grid-gap），再用 translate 平移到格子。
    这样绝对定位的原点与背景格完全对齐，不再“贴在左上角”。
  - 位移动画只作用在 .tile 的 transform 上；缩放(出现/合并弹跳)动画作用在内层 .tile-inner，
    避免 keyframes 的 transform 覆盖 translate 导致新方块又跳回左上角。
*/
.tile {
    width: var(--cell-size); height: var(--cell-size); border-radius: 6px;
    position: absolute; left: var(--grid-gap); top: var(--grid-gap);
    z-index: 10; pointer-events: none;
    transition: transform 120ms cubic-bezier(0.4, 0, 0.2, 1);
}
.tile-inner {
    width: 100%; height: 100%; border-radius: 6px;
    display: flex; justify-content: center; align-items: center;
    font-weight: 700; font-size: 32px;
    transform-origin: center center;
}

/* 磁贴颜色系统 (按 log2 值) */
.v1 .tile-inner { background: #eee4da; color: #776e65; }
.v2 .tile-inner { background: #ede0c8; color: #776e65; }
.v3 .tile-inner { background: #f2b179; color: #f9f6f2; }
.v4 .tile-inner { background: #f59563; color: #f9f6f2; }
.v5 .tile-inner { background: #f67c5f; color: #f9f6f2; }
.v6 .tile-inner { background: #f65e3b; color: #f9f6f2; }
.v7 .tile-inner { background: #edcf72; color: #f9f6f2; }
.v8 .tile-inner { background: #edcc61; color: #f9f6f2; }
.v9 .tile-inner { background: #edc850; color: #f9f6f2; }
.v10 .tile-inner { background: #edc53f; color: #f9f6f2; }
.v11 .tile-inner { background: #edc22e; color: #f9f6f2; box-shadow: 0 0 15px #edc22e; }
.v-huge .tile-inner { background: #3c3a32; color: #f9f6f2; font-size: 24px; }

/* 动画只改 scale，不再干扰外层 translate */
.appear { animation: appear 150ms ease-out; }
.pop { animation: pop 180ms ease-in-out; }
@keyframes appear { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }

.controls { margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
button { background: #2d2d44; color: #fff; border: 1px solid #555; padding: 10px 20px;
         border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.2s; }
button:hover { border-color: #f7971e; }
button.active { background: #f7971e; color: #1a1a2e; border-color: #f7971e; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000;
                   display: flex; flex-direction: column; justify-content: center; align-items: center; }
.loader { width: 50px; height: 50px; border: 5px solid #2d2d44;
          border-top-color: #f7971e; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 460px) {
    :root { --cell-size: 64px; --grid-gap: 8px; }
    h1 { font-size: 22px; }
    .tile-inner { font-size: 26px; }
}
@media (max-width: 340px) {
    :root { --cell-size: 56px; --grid-gap: 7px; }
    .tile-inner { font-size: 22px; }
}
</style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="loader"></div>
    <p style="margin-top:20px; color:#888; letter-spacing: 1px;">INITIALIZING CLIENT-SIDE AI...</p>
    <p id="load-status" style="font-size:12px; color:#555; margin-top:5px">Downloading Weights (13.5MB)</p>
</div>

<div class="container">
    <h1>2048 RL · EDGE</h1>
    <div class="score-board">
        <div class="score-box"><label>Score</label><span id="curr-score">0</span></div>
        <div class="score-box"><label>Best</label><span id="best-score">0</span></div>
    </div>

    <div id="game-board"></div>

    <div class="controls">
        <button onclick="newGame()">New Game</button>
        <button id="ai-btn" onclick="toggleAI()" disabled>AI Loop</button>
        <div style="background:#2d2d44; padding:8px 12px; border-radius:6px; border:1px solid #555; display:flex; align-items:center; gap:8px">
            <span style="font-size:10px; color:#888">SPEED</span>
            <input type="range" id="speed" min="1" max="60" value="15">
        </div>
    </div>
    <p id="info" style="margin-top:15px; font-size:12px; color:#666">本地浏览器 · 8-fold 对称 + 2-ply Expectimax</p>
</div>

<script>
// ============ 1. AI 推理引擎 (纯本地) ============
// 板面约定：grid[index], index = row*4 + col (row=0 顶部, col=0 左侧)，与训练端 game.py 完全一致。
let patterns = [], tables = null, config = null, symIndices = [];
let modelReady = false;

async function loadModel() {
    try {
        const [p, c, t] = await Promise.all([
            fetch('web_model/patterns.json').then(r=>r.json()),
            fetch('web_model/config.json').then(r=>r.json()),
            fetch('web_model/tables.bin').then(r=>r.arrayBuffer())
        ]);
        patterns = p; config = c; tables = new Float32Array(t);

        // 预计算每个 pattern 的 8 个对称索引（4 旋转 × 2 翻转）。
        // 由于对所有 8 个 D4 群元素求和，最终值与训练端 v8(8-fold) 数值一致。
        const flipList = [false, true];
        for (let pi = 0; pi < patterns.length; pi++) {
            let syms = [];
            for (let flip of flipList) {
                for (let rot = 0; rot < 4; rot++) {
                    let cur = [];
                    for (let [r, c] of patterns[pi]) {
                        let tr = r, tc = c;
                        if (flip) tc = 3 - c;            // 水平翻转
                        for (let i = 0; i < rot; i++) {  // 逆时针旋转 rot 次
                            let tmp = tc;
                            tc = 3 - tr;
                            tr = tmp;
                        }
                        cur.push(tr * 4 + tc);
                    }
                    syms.push(cur);
                }
            }
            symIndices.push(syms);
        }
        modelReady = true;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('ai-btn').disabled = false;
    } catch (e) {
        document.getElementById('load-status').textContent = "ERROR: " + e.message;
    }
}

// 8-fold 对称估值，等于训练端 v8(board)。
function getBoardValue(b) {
    let t = 0;
    for (let pi = 0; pi < patterns.length; pi++) {
        let off = config.offsets[pi];
        for (let si = 0; si < 8; si++) {
            let idx = 0;
            for (let p of symIndices[pi][si]) {
                let v = b[p];
                if (v >= 17) v = 16;
                idx = idx * 17 + v;
            }
            t += tables[off + idx];
        }
    }
    return t / (patterns.length * 8);
}

// 模拟一次移动（afterstate，不含随机方块）。返回 {nb, moved}。与 game.py / eval_final.apply_a 一致。
function simulate(b, a) {
    let nb = b.slice(), moved = false;
    for (let i = 0; i < 4; i++) {
        let idx = (a === 0) ? [i, i + 4, i + 8, i + 12]      // UP   : 列 i，向顶压缩
            : (a === 1) ? [i + 12, i + 8, i + 4, i]          // DOWN : 列 i，向底压缩
            : (a === 2) ? [i * 4, i * 4 + 1, i * 4 + 2, i * 4 + 3] // LEFT: 行 i，向左压缩
            : [i * 4 + 3, i * 4 + 2, i * 4 + 1, i * 4];     // RIGHT: 行 i，向右压缩
        let r = idx.map(j => b[j]).filter(v => v !== 0), res = [];
        for (let j = 0; j < r.length; j++) {
            if (j + 1 < r.length && r[j] === r[j + 1]) { res.push(r[j] + 1); j++; }
            else res.push(r[j]);
        }
        while (res.length < 4) res.push(0);
        for (let j = 0; j < 4; j++) { if (b[idx[j]] !== res[j]) moved = true; nb[idx[j]] = res[j]; }
    }
    return { nb, moved };
}

// 对手最优响应（下一手玩家最优 afterstate 估值）。无合法步返回 -1e8（参考 eval_final.best_resp）。
function bestResp(b) {
    let bv = -1e9, any = false;
    for (let a = 0; a < 4; a++) {
        let { nb, moved } = simulate(b, a);
        if (!moved) continue;
        any = true;
        let v = getBoardValue(nb);
        if (v > bv) bv = v;
    }
    return any ? bv : -1e8;
}

// 2-ply Expectimax：玩家手 -> 随机方块 -> 玩家最优手 -> 估值。采样 samps 个空位以提速。
// 与 eval_final.select_2ply 数值一致，复现训练模型的胜率策略。
function aiSelectAction(b, samps = 4) {
    let ba = -1, bv = -1e9, anyMove = false;
    for (let a = 0; a < 4; a++) {
        let { nb: s, moved } = simulate(b, a);
        if (!moved) continue;
        anyMove = true;
        let ea = [];
        for (let i = 0; i < 16; i++) if (s[i] === 0) ea.push(i);
        let v;
        if (ea.length === 0) {
            v = getBoardValue(s);
        } else {
            let ns = Math.min(ea.length, samps);
            let ev = 0;
            for (let si = 0; si < ns; si++) {
                let pos = ea[si % ea.length];
                s[pos] = 1; let v2 = bestResp(s); // 出 2 (val=1, p=0.9)
                s[pos] = 2; let v4 = bestResp(s); // 出 4 (val=2, p=0.1)
                s[pos] = 0;
                ev += 0.9 * v2 + 0.1 * v4;
            }
            v = ev / ns;
        }
        if (v > bv) { bv = v; ba = a; }
    }
    return anyMove ? ba : -1;
}

// ============ 2. 游戏核心与动画 ============
let grid = Array(16).fill(0), score = 0, best = parseInt(localStorage.getItem('b2048') || '0');
let isAnimating = false, aiActive = false;
const INFO_DEFAULT = "本地浏览器 · 8-fold 对称 + 2-ply Expectimax";

const boardDom = document.getElementById('game-board');
let tileNodes = []; // [{id, x, y, val, dom}]

// x=列(横向), y=行(纵向)，与 train 端 row*4+col 一致。
function createTile(x, y, val, anim) {
    const dom = document.createElement('div');
    const inner = document.createElement('div');
    inner.className = 'tile-inner';
    inner.textContent = 1 << val;
    if (anim) inner.classList.add(anim);
    dom.appendChild(inner);
    dom.className = 'tile v' + (val > 11 ? '-huge' : val);
    dom.style.transform = `translate(calc(${x} * var(--move-step)), calc(${y} * var(--move-step)))`;
    boardDom.appendChild(dom);
    return { id: Math.random().toString(36).slice(2), x, y, val, dom };
}

function updateBoard() {
    document.getElementById('curr-score').textContent = score;
    document.getElementById('best-score').textContent = best;
}

function newGame() {
    isAnimating = false;            // 修复：重置动画锁
    aiActive = false;               // 修复：停止 AI 循环
    document.getElementById('ai-btn').classList.remove('active');
    document.getElementById('info').textContent = INFO_DEFAULT;

    boardDom.innerHTML = '';
    for (let i = 0; i < 16; i++) {
        const c = document.createElement('div');
        c.className = 'grid-bg-cell';
        c.style.left = `calc(${i % 4} * var(--move-step) + var(--grid-gap))`;
        c.style.top = `calc(${Math.floor(i / 4)} * var(--move-step) + var(--grid-gap))`;
        boardDom.appendChild(c);
    }
    grid.fill(0); tileNodes = []; score = 0;
    spawn(); spawn(); updateBoard();
}

function spawn() {
    let empty = [];
    grid.forEach((v, i) => { if (v === 0) empty.push(i); });
    if (!empty.length) return;
    let idx = empty[Math.floor(Math.random() * empty.length)];
    let v = Math.random() < 0.9 ? 1 : 2;
    grid[idx] = v;
    let t = createTile(idx % 4, Math.floor(idx / 4), v, 'appear');
    t.dom.style.zIndex = 15; // 新方块在最上层，确保可见
    tileNodes.push(t);
}

// 方向   a: 0=Up 1=Down 2=Left 3=Right（与训练/模拟一致）。
function move(a) {
    if (isAnimating) return;     // 动画锁，防止重叠移动
    let moved = false;
    let nextGrid = Array(16).fill(0);
    let nextNodes = [];
    let pendingRemove = [];

    for (let i = 0; i < 4; i++) {
        let idx = (a === 0) ? [i, i + 4, i + 8, i + 12]
            : (a === 1) ? [i + 12, i + 8, i + 4, i]
            : (a === 2) ? [i * 4, i * 4 + 1, i * 4 + 2, i * 4 + 3]
            : [i * 4 + 3, i * 4 + 2, i * 4 + 1, i * 4];

        // 该“线”上的方块（按移动方向顺序），用 flat index 匹配 (row*4+col = y*4+x)。
        let line = idx.map(p => tileNodes.find(t => t.x === p % 4 && t.y === Math.floor(p / 4)));
        let active = line.filter(t => t);

        let targetSlot = 0;
        for (let j = 0; j < active.length; j++) {
            let t = active[j];
            let targetPos = idx[targetSlot];
            let tx = targetPos % 4, ty = Math.floor(targetPos / 4);

            if (j + 1 < active.length && t.val === active[j + 1].val) {
                // 合并：两块都滑到目标格，随后销毁，并生成新合并块（出现后弹出）。
                let nextT = active[j + 1];
                t.dom.style.zIndex = 10;
                nextT.dom.style.zIndex = 10;
                t.dom.style.transform = `translate(calc(${tx} * var(--move-step)), calc(${ty} * var(--move-step)))`;
                nextT.dom.style.transform = `translate(calc(${tx} * var(--move-step)), calc(${ty} * var(--move-step)))`;
                pendingRemove.push(t, nextT);

                let newVal = t.val + 1;
                score += (1 << newVal);  // 经典 2048 计分：合并得 2^(newVal)，与 game.py 一致

                let combined = createTile(tx, ty, newVal, 'pop');
                combined.dom.style.zIndex = 20;     // 合并块在最上层
                combined.dom.style.display = 'none'; // 等待滑动结束后再显示并弹出
                nextNodes.push(combined);
                nextGrid[targetPos] = newVal;
                moved = true;
                j++; // 合并消耗两个方块
            } else {
                if (t.x !== tx || t.y !== ty) {
                    moved = true;
                    t.dom.style.transform = `translate(calc(${tx} * var(--move-step)), calc(${ty} * var(--move-step)))`;
                }
                t.x = tx; t.y = ty;
                nextNodes.push(t);
                nextGrid[targetPos] = t.val;
            }
            targetSlot++;
        }
    }

    if (moved) {
        isAnimating = true;
        grid = nextGrid;
        tileNodes = nextNodes;
        setTimeout(() => {
            tileNodes.forEach(t => { t.dom.style.display = 'flex'; });
            pendingRemove.forEach(o => o.dom.remove());
            spawn();
            if (score > best) { best = score; localStorage.setItem('b2048', best); }
            updateBoard();
            isAnimating = false;
        }, 130);
    }
}

// ============ 3. 交互与 AI 控制循环 ============
function toggleAI() {
    if (!modelReady) return;
    aiActive = !aiActive;
    document.getElementById('ai-btn').classList.toggle('active', aiActive);
    if (aiActive) loop();
}

function loop() {
    if (!aiActive) return;
    if (!modelReady) { setTimeout(loop, 200); return; }
    if (!isAnimating) {
        let a = aiSelectAction(grid);
        if (a !== -1) {
            move(a);
        } else {
            aiActive = false;
            document.getElementById('ai-btn').classList.remove('active');
            document.getElementById('info').textContent = "GAME OVER · 最高 " + (1 << Math.max(...grid)) + " · 点击 New Game";
            return;
        }
    }
    setTimeout(loop, 1000 / parseInt(document.getElementById('speed').value));
}

document.addEventListener('keydown', e => {
    const map = { 'ArrowUp': 0, 'w': 0, 'ArrowDown': 1, 's': 1,
                  'ArrowLeft': 2, 'a': 2, 'ArrowRight': 3, 'd': 3 };
    if (map[e.key] !== undefined) {
        e.preventDefault();
        aiActive = false;
        document.getElementById('ai-btn').classList.remove('active');
        move(map[e.key]);
    }
});

let tsX = 0, tsY = 0;
document.addEventListener('touchstart', e => {
    tsX = e.touches[0].clientX; tsY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].clientX - tsX;
    let dy = e.changedTouches[0].clientY - tsY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;
    aiActive = false;
    document.getElementById('ai-btn').classList.remove('active');
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 3 : 2);
    else move(dy > 0 ? 1 : 0);  // 三目：dy>0 向下滑 => Down(1)
}, { passive: true });

newGame();
loadModel();
</script>
</body>
</html>
